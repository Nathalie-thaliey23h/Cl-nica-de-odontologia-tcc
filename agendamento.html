<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Consulta - Sorriso Perfeito</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/agendamento.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
</head>
<body>

<header>
    <div class="container">
        <a href="index.html" class="logo">
            <i class="fas fa-tooth"></i> Sorriso Perfeito
        </a>
        <nav>
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="agendamento.html" class="active">Agendamento</a>
            <a href="login.html" class="btn-nav">Área do Paciente</a>
        </nav>
    </div>
</header>

<main>
    <div class="agendamento-container">
        <div class="agendamento-card">
            
            <h1>
                <i class="fas fa-calendar-check destaque-icon"></i>
                Agendar Consulta
            </h1>

            <!-- MENSAGEM - SIMPLES E DIRETA -->
            <div id="mensagem"></div>

            <form id="form-agendamento">
                
                <div class="form-group">
                    <label>Nome completo *</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>E-mail *</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Telefone *</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="data" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Horário *</label>
                        <select id="horario" required>
                            <option value="">Selecione um horário</option>
                            <option>08:00</option>
                            <option>09:00</option>
                            <option>10:00</option>
                            <option>11:00</option>
                            <option>14:00</option>
                            <option>15:00</option>
                            <option>16:00</option>
                            <option>17:00</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Serviço desejado</label>
                    <select id="servico">
                        <option value="">Selecione um serviço</option>
                        <option>Limpeza</option>
                        <option>Clareamento</option>
                        <option>Implante</option>
                        <option>Canal</option>
                        <option>Ortodontia</option>
                        <option>Avaliação</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Observações</label>
                    <textarea id="observacoes" rows="4" placeholder="Alguma observação? (opcional)"></textarea>
                </div>

                <div class="info-agendamento">
                    <i class="fas fa-info-circle"></i>
                    <span>Entraremos em contato para confirmar seu horário.</span>
                </div>

                <button type="submit" class="btn-agendar" id="btnSubmit">
                    Confirmar Agendamento
                </button>

            </form>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 Sorriso Perfeito - Todos os direitos reservados</p>
    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
</footer>

<script type="module" src="JavaScript/firebase-config.js"></script>
<script type="module" src="JavaScript/agendamento.js"></script>

</body>
</html>
