<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Área - Sorriso Perfeito</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/area_paciente.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
</head>
<body>

<header>
    <div class="container">
        <a href="index.html" class="logo">
            <i class="fas fa-tooth"></i> Sorriso Perfeito
        </a>
        <nav>
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="agendamento.html">Agendamento</a>
            <a href="area_paciente.html" class="active">Minha Área</a>
        </nav>
    </div>
</header>

<main>
    <div class="paciente-container">
        
        <!-- Card de boas-vindas com informações do usuário -->
        <div class="welcome-card">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
                <h2 id="userName">Carregando...</h2>
                <p id="userEmail">Carregando...</p>
                <p id="userTelefone"></p>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>

        <!-- Menu rápido -->
        <div class="quick-menu">
            <a href="agendamento.html" class="menu-item">
                <i class="fas fa-calendar-plus"></i>
                <span>Novo Agendamento</span>
            </a>
            <a href="#" class="menu-item" id="verHistorico">
                <i class="fas fa-history"></i>
                <span>Histórico</span>
            </a>
            <a href="#" class="menu-item" id="verAgendamentos">
                <i class="fas fa-calendar-check"></i>
                <span>Agendamentos</span>
            </a>
        </div>

        <!-- Seção de agendamentos futuros -->
        <div class="section" id="proximos-section">
            <h2><i class="fas fa-clock"></i> Próximos Agendamentos</h2>
            <div id="proximos-list" class="agendamentos-list"></div>
        </div>

        <!-- Seção de histórico (inicialmente oculta) -->
        <div class="section" id="historico-section" style="display: none;">
            <h2><i class="fas fa-history"></i> Histórico de Agendamentos</h2>
            <div id="historico-list" class="agendamentos-list"></div>
        </div>

    </div>
</main>

<footer>
    <p>&copy; 2026 Sorriso Perfeito - Todos os direitos reservados</p>
    <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
    </div>
</footer>

<script type="module" src="JavaScript/firebase-config.js"></script>
<script type="module" src="JavaScript/area_paciente.js"></script>
<script type="module" src="JavaScript/auth.js"></script>
</body>
</html>
