<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sorriso Perfeito</title>
    
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
</head>
<body class="auth-body">

<div class="auth-container">
    
    <div class="auth-header">
        <a href="index.html" class="back-button">
            <i class="fas fa-arrow-left"></i>
            <span>Voltar</span>
        </a>
        <div class="auth-logo-small">
            <i class="fas fa-tooth"></i>
            <span>Sorriso Perfeito</span>
        </div>
    </div>

    <div class="auth-card">
        
        <div class="auth-card-header">
            <div class="auth-icon-wrapper">
                <i class="fas fa-user-circle"></i>
            </div>
            <h1>Bem-vindo de volta</h1>
            <p>Não tem uma conta? <a href="cadastroo.html">Cadastre-se</a></p>
        </div>

        <div id="mensagem" class="auth-message" style="display: none;"></div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Digite seu e-mail" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Digite sua senha" required autocomplete="current-password">
                    <i class="fas fa-eye toggle-password"></i>
                </div>
                
                <div style="text-align: right;">
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
            </div>

            <div class="form-checkbox">
                <input type="checkbox" id="lembrar" checked>
                <label for="lembrar">Lembrar-me neste dispositivo</label>
            </div>

            <button type="submit" class="btn-auth" id="btnLogin">
                <span>Entrar na conta</span>
            </button>
        </form>

        <div class="auth-divider">
            <span>ou continue com</span>
        </div>

        <div class="social-auth">
            <button class="btn-social google" type="button">
                <i class="fab fa-google"></i>
                <span>Google</span>
            </button>
            <button class="btn-social facebook" type="button">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
            </button>
        </div>

        <div class="auth-links">
            <p>Novo por aqui? <a href="cadastroo.html"><strong>Criar conta</strong></a></p>
        </div>
    </div>
</div>

<script type="module" src="JavaScript/firebase-config.js"></script>
<script type="module" src="JavaScript/auth.js"></script>

<script>
document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', function() {
        const input = this.previousElementSibling;
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
});
</script>

</body>
</html>
